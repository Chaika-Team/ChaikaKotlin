name: Chaika Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Gradle versionName
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          GRADLE_VERSION="$(grep -m1 'versionName = ' app/build.gradle.kts | sed -E 's/.*versionName = "([^"]+)".*/\1/')"

          if [ -z "$GRADLE_VERSION" ]; then
            echo "Unable to read versionName from app/build.gradle.kts"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
            echo "Tag version '$TAG_VERSION' does not match Gradle versionName '$GRADLE_VERSION'"
            exit 1
          fi

  ktlint:
    name: KtLint
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-android-gradle

      - name: Run ktlint
        run: ./gradlew ktlintCheck --no-daemon

      - name: Upload ktlint reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-ktlint-reports
          path: '**/build/reports/ktlint/**'
          if-no-files-found: ignore
          retention-days: 5

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: preflight

    env:
      STAGE_CHAIKA_SOFT_URL: ${{ secrets.STAGE_CHAIKA_SOFT_URL || 'https://example.invalid/' }}
      STAGE_ZITADEL_TOKEN: ${{ secrets.STAGE_ZITADEL_TOKEN || 'ci-placeholder-token' }}
      STAGE_ZITADEL_URL: ${{ secrets.STAGE_ZITADEL_URL || 'https://example.invalid/' }}

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-android-gradle

      - name: Run stage unit tests and coverage
        run: ./gradlew :app:testStageUnitTest :app:jacocoStageUnitTestReport --no-daemon

      - name: Upload unit test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-unit-test-reports
          path: |
            app/build/test-results/testStageUnitTest
            app/build/reports/tests/testStageUnitTest
            app/build/reports/jacoco/stageUnitTest
          if-no-files-found: ignore
          retention-days: 14

  release-build:
    name: Release build
    runs-on: ubuntu-latest
    needs: preflight

    env:
      REL_CHAIKA_SOFT_URL: ${{ secrets.REL_CHAIKA_SOFT_URL }}
      REL_ZITADEL_TOKEN: ${{ secrets.REL_ZITADEL_TOKEN }}
      REL_ZITADEL_URL: ${{ secrets.REL_ZITADEL_URL }}
      RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      RELEASE_STORE_FILE: app/release.keystore
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-android-gradle

      - name: Check release secrets
        run: |
          missing=()
          for name in \
            REL_CHAIKA_SOFT_URL \
            REL_ZITADEL_TOKEN \
            REL_ZITADEL_URL \
            RELEASE_KEYSTORE_BASE64 \
            RELEASE_STORE_PASSWORD \
            RELEASE_KEY_ALIAS \
            RELEASE_KEY_PASSWORD
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required release secrets: ${missing[*]}"
            exit 1
          fi

      - name: Decode release keystore
        run: |
          umask 077
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > app/release.keystore

      - name: Build signed release artifacts
        run: ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon

      - name: Collect release artifacts
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/*.apk release-artifacts/
          cp app/build/outputs/bundle/release/*.aab release-artifacts/

      - name: Upload release APK and AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-aab
          path: release-artifacts/*
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Remove decoded keystore
        if: always()
        run: rm -f app/release.keystore

  e2e:
    name: E2E non-blocking
    needs: preflight
    uses: ./.github/workflows/e2e.yml
    with:
      lane: hermetic-pr
      allow_failure: true
    secrets: inherit

  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    needs:
      - ktlint
      - unit-tests
      - release-build

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Check SonarQube secrets
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ]; then
            echo "SONAR_TOKEN and SONAR_HOST_URL are required for release."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-android-gradle

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Download unit test reports
        uses: actions/download-artifact@v4
        with:
          name: release-unit-test-reports
          path: app/build

      - name: Run Detekt report
        continue-on-error: true
        run: ./gradlew :app:detekt --no-daemon

      - name: Verify Sonar input reports
        run: |
          test -d app/build/test-results/testStageUnitTest
          test -f app/build/reports/jacoco/stageUnitTest/stageUnitTest.xml
          ls -la app/build/reports/detekt || true

      - name: Run SonarQube scan
        run: >
          ./gradlew
          sonar
          --no-daemon
          -Dsonar.host.url="${SONAR_HOST_URL}"
          -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - sonar
      - release-build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release APK and AAB
        uses: actions/download-artifact@v4
        with:
          name: release-apk-aab
          path: release-artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release-artifacts/* \
            --verify-tag \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
