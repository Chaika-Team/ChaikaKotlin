name: ChaikaPipeline

on:
  push:
    branches:
      - 'CHK-*'
      - 'CHOPS-*'
      - 'fix/*'
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  analyze:
    name: Build, test and analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - name: Upload ktlint report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ktlint-report
          path: '**/build/reports/ktlint/'
          retention-days: 5

      - name: Build and run unit tests
        env:
          STAGE_CHAIKA_SOFT_URL: ${{ secrets.STAGE_CHAIKA_SOFT_URL }}
          STAGE_ZITADEL_TOKEN: ${{ secrets.STAGE_ZITADEL_TOKEN }}
          STAGE_ZITADEL_URL: ${{ secrets.STAGE_ZITADEL_URL }}
        run: ./gradlew clean buildStage testStage jacocoTestReportStage

      # - name: Enable KVM
      #   run: |
      #     echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
      #     sudo udevadm control --reload-rules
      #     sudo udevadm trigger --name-match=kvm

      # - name: Run Integration tests
      #   uses: reactivecircus/android-emulator-runner@v2
      #   with:
      #     api-level: 29
      #     script: ./gradlew :app:connectedAndroidTest -i

      - name: Run SonarQube scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.sources=app/src/main
            -Dsonar.tests=app/src/test
            -Dsonar.projectKey=ChaikaKotlin
            -Dsonar.junit.reportPaths=app/build/test-results/
            -Dsonar.coverage.jacoco.xmlReportPaths=app/build/reports/jacoco/jacoco.xml
            -Dsonar.exclusions=**/*.mock.kt,**/generated/**,**/res/**

      - name: Static check by Detekt
        run: ./gradlew detekt
        continue-on-error: true

      - name: SonarQube QualityGate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: analyze
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify tag matches Gradle versionName
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          GRADLE_VERSION="$(grep -m1 'versionName = ' app/build.gradle.kts | sed -E 's/.*versionName = "([^"]+)".*/\1/')"

          if [ -z "$GRADLE_VERSION" ]; then
            echo "Unable to read versionName from app/build.gradle.kts"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
            echo "Tag version '$TAG_VERSION' does not match Gradle versionName '$GRADLE_VERSION'"
            exit 1
          fi

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "RELEASE_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi

          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > app/release.keystore

      - name: Build signed release artifacts
        env:
          REL_CHAIKA_SOFT_URL: ${{ secrets.REL_CHAIKA_SOFT_URL }}
          REL_ZITADEL_TOKEN: ${{ secrets.REL_ZITADEL_TOKEN }}
          REL_ZITADEL_URL: ${{ secrets.REL_ZITADEL_URL }}
          RELEASE_STORE_FILE: app/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease :app:bundleRelease

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/bundle/release/app-release.aab \
            --verify-tag \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
