name: env-smoke

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  env-smoke:
    name: Environment Smoke (non-PR gate)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: stage
    env:
      REL_CHAIKA_SOFT_URL: ${{ secrets.REL_CHAIKA_SOFT_URL }}
      REL_ZITADEL_TOKEN: ${{ secrets.REL_ZITADEL_TOKEN }}
      REL_ZITADEL_URL: ${{ secrets.REL_ZITADEL_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run environment smoke class
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          script: >
            ./gradlew
            :e2e-tests:connectedDebugAndroidTest
            -Pandroid.testInstrumentationRunnerArguments.class=com.chaikasoft.app.e2e.tests.EnvSmokeE2ETest
            -Pandroid.testInstrumentationRunnerArguments.e2e.env=true
            -Pandroid.testInstrumentationRunnerArguments.e2e.authMode=disabled
            -Pandroid.testInstrumentationRunnerArguments.e2e.tripGateMode=normal
            --stacktrace
            --console=plain

      - name: Upload env smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: env-smoke-artifacts
          path: |
            e2e-tests/build/reports/**
            e2e-tests/build/outputs/**
            e2e-tests/build/outputs/androidTest-results/**
            e2e-tests/build/outputs/managed_device_android_test_additional_output/**
            e2e-tests/build/outputs/connected_android_test_additional_output/**
          if-no-files-found: warn
