name: e2e-pr

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  hermetic-pr-gate:
    name: Hermetic E2E PR Gate
    uses: ./.github/workflows/e2e.yml
    with:
      lane: hermetic-pr
    secrets: inherit
