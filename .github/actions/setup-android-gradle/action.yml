name: Setup Android Gradle
description: Setup JDK 17 and Gradle cache for Android jobs.

runs:
  using: composite
  steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: zulu

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v6
